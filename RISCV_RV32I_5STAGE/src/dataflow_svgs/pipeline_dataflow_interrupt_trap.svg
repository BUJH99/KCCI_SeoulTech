<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 1180" width="1800" height="1180" style="background:#ffffff;font-family:'Malgun Gothic','Noto Sans CJK KR',Arial,sans-serif;">
  <defs>
    <marker id="arr-blue" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1769aa"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c62828"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2e7d32"/>
    </marker>
    <marker id="arr-gray" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#374151"/>
    </marker>
    <style>
      .title { fill:#111827;font-size:32px;font-weight:800;text-anchor:middle; }
      .subtitle { fill:#4b5563;font-size:15px;font-weight:600;text-anchor:middle; }
      .band { fill:#f8fafc;stroke:#d6e0ea;stroke-width:2;rx:18; }
      .band-title { fill:#334155;font-size:18px;font-weight:800;text-anchor:middle; }
      .box { fill:#ffffff;stroke:#64748b;stroke-width:2;rx:10; }
      .box-blue { fill:#eef6ff;stroke:#1769aa;stroke-width:2.5;rx:10; }
      .box-red { fill:#fff1f2;stroke:#c62828;stroke-width:2.5;rx:10; }
      .box-green { fill:#effaf1;stroke:#2e7d32;stroke-width:2.5;rx:10; }
      .box-yellow { fill:#fff8db;stroke:#b08900;stroke-width:2.5;rx:10; }
      .box-purple { fill:#f6efff;stroke:#805ad5;stroke-width:2.5;rx:10; }
      .box-gray { fill:#f8fafc;stroke:#94a3b8;stroke-width:2;rx:10; }
      .note { fill:#ffffff;stroke:#cbd5e1;stroke-width:1.5;rx:8; }
      .txt { fill:#111827;font-size:14px;font-weight:700;text-anchor:middle;dominant-baseline:central; }
      .txt-sm { fill:#334155;font-size:12px;font-weight:650;text-anchor:middle;dominant-baseline:central; }
      .txt-xs { fill:#475569;font-size:10.5px;font-weight:600;text-anchor:middle;dominant-baseline:central; }
      .txt-left { fill:#111827;font-size:13px;font-weight:700;text-anchor:start;dominant-baseline:central; }
      .txt-left-sm { fill:#334155;font-size:11.2px;font-weight:600;text-anchor:start;dominant-baseline:central; }
      .wire-blue { fill:none;stroke:#1769aa;stroke-width:4;stroke-linecap:round;stroke-linejoin:round;marker-end:url(#arr-blue); }
      .wire-red { fill:none;stroke:#c62828;stroke-width:4;stroke-linecap:round;stroke-linejoin:round;marker-end:url(#arr-red); }
      .wire-green { fill:none;stroke:#2e7d32;stroke-width:4;stroke-linecap:round;stroke-linejoin:round;marker-end:url(#arr-green); }
      .wire-gray { fill:none;stroke:#374151;stroke-width:3;stroke-linecap:round;stroke-linejoin:round;marker-end:url(#arr-gray); }
      .wire-dash { fill:none;stroke:#64748b;stroke-width:3;stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:8,7;marker-end:url(#arr-gray); }
      .wire-bg { fill:none;stroke:#ffffff;stroke-width:9;stroke-linecap:round;stroke-linejoin:round; }
      .badge-blue { fill:#ffffff;stroke:#1769aa;stroke-width:2.5; }
      .badge-red { fill:#ffffff;stroke:#c62828;stroke-width:2.5; }
      .badge-green { fill:#ffffff;stroke:#2e7d32;stroke-width:2.5; }
      .badge-gray { fill:#ffffff;stroke:#64748b;stroke-width:2.5; }
      .badge-text { fill:#111827;font-size:13px;font-weight:800;text-anchor:middle;dominant-baseline:central; }
      .mono { font-family:Consolas,'Courier New',monospace;font-size:11px;font-weight:700;fill:#1f2937; }
    </style>
  </defs>

  <text class="title" x="900" y="44">RV32I 5-Stage Interrupt / Trap Flow</text>
  <text class="subtitle" x="900" y="72">Peripheral IRQ -> INTC pending/claim -> CSR MEIP -> TrapController -> mtvec redirect / CSR trap entry -> handler -> mret</text>

  <rect class="band" x="40" y="110" width="330" height="880"/>
  <text class="band-title" x="205" y="140">1. IRQ Source</text>

  <rect class="box-blue" x="70" y="175" width="270" height="120"/>
  <text class="txt" x="205" y="205">APB_UART</text>
  <text class="txt-sm" x="205" y="234">RX FIFO not empty</text>
  <text class="txt-sm" x="205" y="258">and RX IRQ enable</text>
  <text class="txt-xs" x="205" y="280">oIrq = !RxFifoEmpty &amp;&amp; RxIrqEn</text>

  <rect class="box-green" x="70" y="335" width="270" height="140"/>
  <text class="txt" x="205" y="365">APB_GPIO</text>
  <text class="txt-sm" x="205" y="395">rise/fall edge detect</text>
  <text class="txt-sm" x="205" y="419">sticky IRQ_STATUS</text>
  <text class="txt-xs" x="205" y="445">oIrq = |IrqStatus</text>

  <rect class="note" x="70" y="830" width="270" height="120"/>
  <text class="txt-left" x="92" y="858">Peripheral clear</text>
  <text class="txt-left-sm" x="92" y="885">UART: RXDATA read drains RX FIFO</text>
  <text class="txt-left-sm" x="92" y="910">GPIO: write IRQ_STATUS clear mask</text>
  <text class="txt-left-sm" x="92" y="934">then INTC COMPLETE is written</text>

  <rect class="band" x="410" y="110" width="430" height="880"/>
  <text class="band-title" x="625" y="140">2. InterruptController MMIO</text>

  <rect class="box-yellow" x="450" y="190" width="350" height="130"/>
  <text class="txt" x="625" y="220">IntcPendingCtrl</text>
  <text class="txt-sm" x="625" y="249">raw IRQ -> PendingVec latch</text>
  <text class="txt-sm" x="625" y="274">CLAIM clears pending, sets in-service</text>
  <text class="txt-xs" x="625" y="300">prevents retrigger until COMPLETE</text>

  <rect class="box-purple" x="450" y="370" width="350" height="150"/>
  <text class="txt" x="625" y="400">IntcRegIf</text>
  <text class="txt-sm" x="625" y="429">PENDING / ENABLE / CLAIM / COMPLETE</text>
  <text class="txt-sm" x="625" y="455">software writes ENABLE mask</text>
  <text class="txt-xs" x="625" y="482">CLAIM read returns 1-based source ID</text>

  <rect class="box-blue" x="450" y="575" width="350" height="135"/>
  <text class="txt" x="625" y="604">IntcPriorityClaim</text>
  <text class="txt-sm" x="625" y="632">ClaimPendingVec = PendingVec &amp; EnableVec</text>
  <text class="txt-sm" x="625" y="657">lowest source index wins</text>
  <text class="txt-xs" x="625" y="684">oMachineExtIrq = |ClaimPendingVec</text>

  <rect class="note" x="450" y="770" width="350" height="180"/>
  <text class="txt-left" x="474" y="800">Source ID map in TOP</text>
  <text class="txt-left-sm" x="474" y="828">IntcIrqVec = {UartIrq, GpioIrq}</text>
  <text class="txt-left-sm" x="474" y="856">ID 1: GPIO, ID 2: UART</text>
  <text class="txt-left-sm" x="474" y="884">ID 0: no interrupt</text>
  <text class="txt-left-sm" x="474" y="912">ENABLE is independent from CSR mie.MEIE</text>

  <rect class="band" x="880" y="110" width="380" height="880"/>
  <text class="band-title" x="1070" y="140">3. CSR / Trap Gate</text>

  <rect class="box-green" x="920" y="185" width="300" height="230"/>
  <text class="txt" x="1070" y="215">CsrFile</text>
  <text class="txt-sm" x="1070" y="245">mip.MEIP = ExtIrqPending | SW bit</text>
  <text class="txt-sm" x="1070" y="272">mie.MEIE enables machine external IRQ</text>
  <text class="txt-sm" x="1070" y="299">mstatus.MIE is global interrupt enable</text>
  <text class="txt-sm" x="1070" y="326">mtvec supplies trap handler PC</text>
  <text class="txt-xs" x="1070" y="361">CSR writes / trap entry / mret update registers</text>
  <text class="txt-xs" x="1070" y="388">mtvec and mepc are word-aligned</text>

  <rect class="box-red" x="920" y="485" width="300" height="205"/>
  <text class="txt" x="1070" y="515">TrapController</text>
  <text class="txt-sm" x="1070" y="544">priority: MEM &gt; EX &gt; ID &gt; IRQ</text>
  <text class="txt-sm" x="1070" y="571">IRQ accept only when:</text>
  <text class="mono" x="955" y="603">IFID.Valid</text>
  <text class="mono" x="955" y="624">no MEM/EX/ID trap</text>
  <text class="mono" x="955" y="645">no EX redirect</text>
  <text class="mono" x="955" y="666">MIE &amp;&amp; MEIE &amp;&amp; MEIP</text>

  <rect class="box-gray" x="920" y="760" width="300" height="175"/>
  <text class="txt" x="1070" y="788">Trap sources from pipeline</text>
  <text class="txt-sm" x="1070" y="817">ID: illegal, ECALL, EBREAK, JAL misalign</text>
  <text class="txt-sm" x="1070" y="844">EX: carried trap, JALR/branch/mret misalign</text>
  <text class="txt-sm" x="1070" y="871">MEM: load/store misalign or access fault</text>
  <text class="txt-xs" x="1070" y="907">synchronous traps outrank interrupt accept</text>

  <rect class="band" x="1300" y="110" width="460" height="880"/>
  <text class="band-title" x="1530" y="140">4. Global Processor Control</text>

  <rect class="box-red" x="1340" y="185" width="380" height="165"/>
  <text class="txt" x="1530" y="215">Trap entry CSR update</text>
  <text class="txt-sm" x="1530" y="246">mepc &lt;= selected trap PC</text>
  <text class="txt-sm" x="1530" y="273">mcause &lt;= cause</text>
  <text class="txt-sm" x="1530" y="300">MPIE &lt;= MIE, MIE &lt;= 0</text>
  <text class="txt-xs" x="1530" y="326">for IRQ: cause = 0x8000000B</text>

  <rect class="box-blue" x="1340" y="410" width="380" height="155"/>
  <text class="txt" x="1530" y="439">PipeFlowCtrl</text>
  <text class="txt-sm" x="1530" y="468">PcWe asserted for trap capture</text>
  <text class="txt-sm" x="1530" y="494">front-end flush, selected younger stages flushed</text>
  <text class="txt-xs" x="1530" y="524">APB MEM stall delays trap/redirect/CSR side effects</text>

  <rect class="box-green" x="1340" y="625" width="380" height="145"/>
  <text class="txt" x="1530" y="653">FetchStage / NextPcMux / Pc</text>
  <text class="txt-sm" x="1530" y="682">trap redirect has highest PC priority</text>
  <text class="txt-sm" x="1530" y="709">PC &lt;= mtvec on trap entry</text>
  <text class="txt-xs" x="1530" y="736">then handler instruction fetch begins</text>

  <rect class="box-purple" x="1340" y="830" width="380" height="120"/>
  <text class="txt" x="1530" y="858">Handler / MRET</text>
  <text class="txt-sm" x="1530" y="887">read CLAIM, service source, write COMPLETE</text>
  <text class="txt-sm" x="1530" y="914">mret redirects PC to mepc and restores MIE</text>

  <path class="wire-bg" d="M 340 235 H 450"/>
  <path class="wire-blue" d="M 340 235 H 450"/>
  <circle class="badge-blue" cx="392" cy="235" r="15"/>
  <text class="badge-text" x="392" y="235">1</text>
  <text class="txt-xs" x="395" y="214">UartIrq</text>

  <path class="wire-bg" d="M 340 405 H 405 V 270 H 450"/>
  <path class="wire-green" d="M 340 405 H 405 V 270 H 450"/>
  <circle class="badge-green" cx="405" cy="405" r="15"/>
  <text class="badge-text" x="405" y="405">1</text>
  <text class="txt-xs" x="391" y="386">GpioIrq</text>

  <path class="wire-bg" d="M 625 320 V 370"/>
  <path class="wire-gray" d="M 625 320 V 370"/>
  <circle class="badge-gray" cx="625" cy="346" r="15"/>
  <text class="badge-text" x="625" y="346">2</text>

  <path class="wire-bg" d="M 625 520 V 575"/>
  <path class="wire-gray" d="M 625 520 V 575"/>
  <circle class="badge-gray" cx="625" cy="548" r="15"/>
  <text class="badge-text" x="625" y="548">3</text>

  <path class="wire-bg" d="M 800 642 H 860 V 300 H 920"/>
  <path class="wire-blue" d="M 800 642 H 860 V 300 H 920"/>
  <circle class="badge-blue" cx="860" cy="642" r="15"/>
  <text class="badge-text" x="860" y="642">4</text>
  <text class="txt-xs" x="854" y="621">ExtIrqPending</text>

  <path class="wire-bg" d="M 1070 415 V 485"/>
  <path class="wire-green" d="M 1070 415 V 485"/>
  <circle class="badge-green" cx="1070" cy="449" r="15"/>
  <text class="badge-text" x="1070" y="449">5</text>
  <text class="txt-xs" x="1142" y="449">MIE / MEIE / MEIP / mtvec</text>

  <path class="wire-bg" d="M 920 820 H 875 V 588 H 920"/>
  <path class="wire-red" d="M 920 820 H 875 V 588 H 920"/>
  <circle class="badge-red" cx="875" cy="820" r="15"/>
  <text class="badge-text" x="875" y="820">6</text>
  <text class="txt-xs" x="840" y="800">ID/EX/MEM trap</text>

  <path class="wire-bg" d="M 1220 565 H 1280 V 267 H 1340"/>
  <path class="wire-red" d="M 1220 565 H 1280 V 267 H 1340"/>
  <circle class="badge-red" cx="1280" cy="565" r="15"/>
  <text class="badge-text" x="1280" y="565">7</text>
  <text class="txt-xs" x="1278" y="544">TrapEnterValid/EPC/Cause</text>

  <path class="wire-bg" d="M 1220 618 H 1270 V 488 H 1340"/>
  <path class="wire-blue" d="M 1220 618 H 1270 V 488 H 1340"/>
  <circle class="badge-blue" cx="1270" cy="618" r="15"/>
  <text class="badge-text" x="1270" y="618">8</text>
  <text class="txt-xs" x="1268" y="598">TrapCaptureValid</text>

  <path class="wire-bg" d="M 1220 650 H 1260 V 697 H 1340"/>
  <path class="wire-green" d="M 1220 650 H 1260 V 697 H 1340"/>
  <circle class="badge-green" cx="1260" cy="650" r="15"/>
  <text class="badge-text" x="1260" y="650">9</text>
  <text class="txt-xs" x="1256" y="674">TrapRedirectPc = mtvec</text>

  <path class="wire-bg" d="M 1530 770 V 830"/>
  <path class="wire-gray" d="M 1530 770 V 830"/>
  <circle class="badge-gray" cx="1530" cy="800" r="15"/>
  <text class="badge-text" x="1530" y="800">10</text>

  <path class="wire-bg" d="M 1340 890 H 820 V 445 H 800"/>
  <path class="wire-dash" d="M 1340 890 H 820 V 445 H 800"/>
  <circle class="badge-gray" cx="820" cy="890" r="15"/>
  <text class="badge-text" x="820" y="890">11</text>
  <text class="txt-xs" x="1020" y="870">handler reads CLAIM / writes COMPLETE via APB</text>

  <path class="wire-bg" d="M 1340 922 H 1260 V 250 H 1220"/>
  <path class="wire-dash" d="M 1340 922 H 1260 V 250 H 1220"/>
  <circle class="badge-gray" cx="1260" cy="922" r="15"/>
  <text class="badge-text" x="1260" y="922">12</text>
  <text class="txt-xs" x="1248" y="942">mret: MIE &lt;= MPIE, PC &lt;= mepc</text>

  <rect class="note" x="40" y="1020" width="1720" height="120"/>
  <text class="txt-left" x="70" y="1050">Step order</text>
  <text class="txt-left-sm" x="70" y="1080">1 IRQ 발생 -> 2 pending latch -> 3 enable mask/claim candidate -> 4 ExtIrqPending -> 5 CSR MEIP/enable gate -> 6 sync trap priority merge -> 7 mepc/mcause/mstatus update -> 8 flush/PC control -> 9 PC=mtvec -> 10 handler -> 11 CLAIM/COMPLETE -> 12 MRET return</text>
  <text class="txt-left-sm" x="70" y="1110">정확성 포인트: TrapController는 MEM &gt; EX &gt; ID trap을 interrupt보다 우선 처리하며, APB memory stall 중에는 trap/redirect/CSR update가 지연됩니다.</text>
</svg>
