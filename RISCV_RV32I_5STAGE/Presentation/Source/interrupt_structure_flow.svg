<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="1050" viewBox="0 0 1700 1050">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#000000"/>
    </marker>
    <style>
      svg { background:#ffffff; font-family:Arial, Helvetica, sans-serif; }
      .box { fill:#ffffff; stroke:#000000; stroke-width:2; }
      .ghost { fill:#ffffff; stroke:#000000; stroke-width:1.7; }
      .line { fill:none; stroke:#000000; stroke-width:2; stroke-linecap:square; stroke-linejoin:miter; marker-end:url(#arrow); }
      .dash { fill:none; stroke:#000000; stroke-width:2; stroke-linecap:square; stroke-linejoin:miter; stroke-dasharray:8 7; marker-end:url(#arrow); }
      .boundary { fill:none; stroke:#000000; stroke-width:2; stroke-dasharray:8 12; }
      .thin { fill:none; stroke:#000000; stroke-width:1.5; stroke-linecap:square; stroke-linejoin:miter; }
      .title { fill:#000000; font-size:20px; text-anchor:middle; dominant-baseline:middle; }
      .label { fill:#000000; font-size:16px; text-anchor:middle; dominant-baseline:middle; }
      .text { fill:#000000; font-size:16px; text-anchor:middle; dominant-baseline:middle; }
      .small { fill:#000000; font-size:13px; text-anchor:middle; dominant-baseline:middle; }
      .tiny { fill:#000000; font-size:11px; text-anchor:middle; dominant-baseline:middle; }
      .left { fill:#000000; font-size:13px; text-anchor:start; dominant-baseline:middle; }
      .wirelabel { fill:#ffffff; stroke:none; }
      .dot { fill:#000000; }
    </style>
  </defs>

