<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="430" viewBox="0 0 1100 430" role="img" aria-labelledby="title desc">
  <title id="title">RV32I Core Interrupt Path With Timer</title>
  <desc id="desc">Shows external interrupt from INTC and machine timer interrupt from APB Timer entering CsrFile and TrapController.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 22px Arial, sans-serif; fill: #111827; }
      .label { font: 700 15px Arial, sans-serif; fill: #111827; }
      .small { font: 12px Arial, sans-serif; fill: #374151; }
      .box { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 8; }
      .core { fill: #e0f2fe; stroke: #0369a1; stroke-width: 2; rx: 8; }
      .irq { fill: #fee2e2; stroke: #b91c1c; stroke-width: 2; rx: 8; }
      .csr { fill: #fef3c7; stroke: #b45309; stroke-width: 2; rx: 8; }
      .line { stroke: #334155; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .red { stroke: #dc2626; stroke-width: 2.4; fill: none; marker-end: url(#arrow-red); }
      .blue { stroke: #2563eb; stroke-width: 2.4; fill: none; marker-end: url(#arrow-blue); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#dc2626"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2563eb"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1100" height="430"/>
  <text class="title" x="36" y="42">Core Interrupt Path After APB Timer Addition</text>

  <rect class="irq" x="60" y="92" width="180" height="76"/>
  <text class="label" x="102" y="123">APB_Timer</text>
  <text class="small" x="84" y="146">oTimerIrqPending</text>

  <rect class="irq" x="60" y="250" width="180" height="76"/>
  <text class="label" x="84" y="281">InterruptController</text>
  <text class="small" x="84" y="304">oMachineExtIrq</text>

  <rect class="core" x="320" y="70" width="260" height="280"/>
  <text class="label" x="405" y="102">Rv32iCore</text>

  <rect class="csr" x="360" y="130" width="180" height="88"/>
  <text class="label" x="419" y="162">CsrFile</text>
  <text class="small" x="384" y="185">MTIP/MEIP pending bits</text>
  <text class="small" x="386" y="203">MTIE/MEIE enable bits</text>

  <rect class="csr" x="360" y="244" width="180" height="74"/>
  <text class="label" x="394" y="276">TrapController</text>
  <text class="small" x="389" y="298">accept + mcause select</text>

  <rect class="box" x="680" y="92" width="190" height="76"/>
  <text class="label" x="717" y="123">Timer Trap</text>
  <text class="small" x="712" y="146">mcause 0x8000_0007</text>

  <rect class="box" x="680" y="250" width="190" height="76"/>
  <text class="label" x="710" y="281">External Trap</text>
  <text class="small" x="712" y="304">mcause 0x8000_000B</text>

  <rect class="box" x="930" y="170" width="130" height="86"/>
  <text class="label" x="961" y="203">Next PC</text>
  <text class="small" x="952" y="226">mtvec or INTC</text>
  <text class="small" x="958" y="244">vector PC</text>

  <path class="red" d="M240 130 H360"/>
  <text class="small" x="259" y="116">iTimerIrqPending</text>
  <path class="blue" d="M240 288 H360"/>
  <text class="small" x="258" y="274">iExtIrqPending</text>
  <path class="line" d="M450 218 V244"/>
  <path class="red" d="M540 174 C620 174 620 130 680 130"/>
  <path class="blue" d="M540 282 H680"/>
  <path class="line" d="M870 130 C915 130 915 200 930 200"/>
  <path class="line" d="M870 288 C915 288 915 226 930 226"/>
</svg>
