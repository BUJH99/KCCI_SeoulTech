<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Bubble Sort Demo Algorithm State Machine</title>
  <desc id="desc">Application-level algorithm state machine for IDLE, LOADED, SORTING, PAUSED, and DONE states.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 24px Arial, sans-serif; fill: #111827; }
      .label { font: 700 15px Arial, sans-serif; fill: #111827; }
      .small { font: 12px Arial, sans-serif; fill: #374151; }
      .tiny { font: 11px Arial, sans-serif; fill: #4b5563; }
      .state { fill: #e0f2fe; stroke: #0369a1; stroke-width: 2; rx: 8; }
      .action { fill: #dcfce7; stroke: #15803d; stroke-width: 2; rx: 8; }
      .decision { fill: #fef3c7; stroke: #b45309; stroke-width: 2; }
      .done { fill: #f3e8ff; stroke: #7e22ce; stroke-width: 2; rx: 8; }
      .line { stroke: #334155; stroke-width: 2.1; fill: none; marker-end: url(#arrow); }
      .blue { stroke: #2563eb; stroke-width: 2.1; fill: none; marker-end: url(#arrow-blue); }
      .red { stroke: #dc2626; stroke-width: 2.1; fill: none; marker-end: url(#arrow-red); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#dc2626"/>
    </marker>
  </defs>

  <rect class="bg" width="1280" height="720"/>
  <text class="title" x="42" y="46">Application Algorithm State Machine: Bubble Sort Demo</text>
  <text class="small" x="42" y="70">Maps directly to demo_state_t and demo_* functions in sw/apps/hello_world/src/main.c.</text>

  <rect class="state" x="70" y="145" width="170" height="86"/>
  <text class="label" x="118" y="176">DEMO_IDLE</text>
  <text class="small" x="98" y="199">array = 0000</text>
  <text class="small" x="98" y="216">waiting input</text>

  <rect class="state" x="330" y="145" width="190" height="86"/>
  <text class="label" x="375" y="176">DEMO_LOADED</text>
  <text class="small" x="362" y="199">digit shift-in</text>
  <text class="small" x="362" y="216">MASTER FND update</text>

  <rect class="state" x="610" y="145" width="190" height="86"/>
  <text class="label" x="653" y="176">DEMO_SORTING</text>
  <text class="small" x="640" y="199">timer-paced steps</text>
  <text class="small" x="640" y="216">compare/swap trace</text>

  <rect class="state" x="610" y="390" width="190" height="86"/>
  <text class="label" x="657" y="421">DEMO_PAUSED</text>
  <text class="small" x="640" y="444">hold current array</text>
  <text class="small" x="640" y="461">one-step allowed</text>

  <rect class="done" x="910" y="145" width="190" height="86"/>
  <text class="label" x="958" y="176">DEMO_DONE</text>
  <text class="small" x="940" y="199">final FND result</text>
  <text class="small" x="940" y="216">UART result output</text>

  <polygon class="decision" points="425,300 535,350 425,400 315,350"/>
  <text class="label" x="366" y="346">start cmd?</text>
  <text class="tiny" x="363" y="366">UART s / GPIO bit0</text>

  <polygon class="decision" points="705,270 815,320 705,370 595,320"/>
  <text class="label" x="644" y="316">sort done?</text>
  <text class="tiny" x="645" y="336">pass_idx >= len-1</text>

  <rect class="action" x="330" y="520" width="190" height="86"/>
  <text class="label" x="374" y="551">LOAD_VALUE</text>
  <text class="small" x="357" y="574">UART 0-9</text>
  <text class="small" x="357" y="591">TRACE_LOAD via SPI</text>

  <rect class="action" x="910" y="390" width="190" height="86"/>
  <text class="label" x="957" y="421">RESET_CMD</text>
  <text class="small" x="940" y="444">UART r / GPIO bit3</text>
  <text class="small" x="940" y="461">demo_reset()</text>

  <path class="line" d="M240 188 H330"/>
  <text class="tiny" x="258" y="174">digit input</text>
  <path class="line" d="M425 231 V300"/>
  <path class="line" d="M535 350 C575 350 590 255 610 188"/>
  <text class="tiny" x="548" y="330">yes</text>
  <path class="line" d="M705 231 V270"/>
  <path class="line" d="M815 320 C880 320 890 200 910 188"/>
  <text class="tiny" x="834" y="302">yes</text>
  <path class="line" d="M595 320 C560 320 535 350 535 350"/>
  <text class="tiny" x="548" y="305">no: next step</text>

  <path class="blue" d="M705 231 V390"/>
  <text class="tiny" x="716" y="304">pause cmd</text>
  <path class="blue" d="M610 433 C545 433 535 350 535 350"/>
  <text class="tiny" x="532" y="425">resume cmd</text>
  <path class="blue" d="M800 433 C860 433 850 320 815 320"/>
  <text class="tiny" x="820" y="418">one-step cmd</text>

  <path class="line" d="M425 520 V400"/>
  <text class="tiny" x="438" y="493">load allowed if not sorting/paused</text>
  <path class="line" d="M425 520 C230 520 155 360 155 231"/>
  <text class="tiny" x="245" y="548">from IDLE or DONE, digit input</text>

  <path class="red" d="M910 433 C700 640 210 640 155 231"/>
  <path class="red" d="M1005 390 V231"/>
  <path class="red" d="M910 433 C820 520 720 520 705 476"/>
  <text class="tiny" x="928" y="373">reset can return to IDLE</text>

  <text class="small" x="70" y="672">Outputs by state: MASTER FND always shows current array, SPI sends trace frames on load/compare/swap/pass/done/pause, I2C writes SLAVE display mode/brightness.</text>
</svg>
