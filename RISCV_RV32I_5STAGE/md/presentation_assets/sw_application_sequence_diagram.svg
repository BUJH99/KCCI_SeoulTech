<svg xmlns="http://www.w3.org/2000/svg" width="1380" height="860" viewBox="0 0 1380 860" role="img" aria-labelledby="title desc">
  <title id="title">Application Sequence Diagram</title>
  <desc id="desc">Bubble Sort firmware application sequence diagram using a simple monochrome lifeline style.</desc>
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .title { font: 700 24px Arial, sans-serif; fill: #111111; }
      .head { font: 14px Arial, sans-serif; fill: #111111; }
      .label { font: italic 13px Arial, sans-serif; fill: #111111; }
      .note { font: 12px Arial, sans-serif; fill: #111111; }
      .line { stroke: #111111; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
      .return { stroke: #111111; stroke-width: 1.2; fill: none; marker-end: url(#arrow); }
      .life { stroke: #111111; stroke-width: 1.2; stroke-dasharray: 6 5; }
      .brace { stroke: #111111; stroke-width: 4; fill: none; stroke-linecap: round; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#111111"/>
    </marker>
  </defs>

  <rect class="bg" width="1380" height="860"/>
  <text class="title" x="28" y="36">Application Sequence Diagram: Bubble Sort Demo</text>

  <g id="lifelines">
    <text class="head" x="44" y="82">User</text>
    <line class="life" x1="70" y1="96" x2="70" y2="810"/>

    <text class="head" x="168" y="82">UART / GPIO</text>
    <line class="life" x1="220" y1="96" x2="220" y2="810"/>

    <text class="head" x="330" y="82">Application</text>
    <line class="life" x1="382" y1="96" x2="382" y2="810"/>

    <text class="head" x="488" y="82">Timer / Trap</text>
    <line class="life" x1="540" y1="96" x2="540" y2="810"/>

    <text class="head" x="638" y="82">FND Driver</text>
    <line class="life" x1="690" y1="96" x2="690" y2="810"/>

    <text class="head" x="790" y="82">SPI Driver</text>
    <line class="life" x1="840" y1="96" x2="840" y2="810"/>

    <text class="head" x="932" y="82">I2C Driver</text>
    <line class="life" x1="985" y1="96" x2="985" y2="810"/>

    <text class="head" x="1102" y="82">SLAVE FPGA</text>
    <line class="life" x1="1155" y1="96" x2="1155" y2="810"/>
  </g>

  <path class="line" d="M70 132 H220"/>
  <text class="label" x="88" y="123">Digit or command input</text>
  <path class="line" d="M220 165 H382"/>
  <text class="label" x="238" y="156">service_uart / service_gpio</text>

  <path class="line" d="M382 198 H690"/>
  <text class="label" x="438" y="189">demo_load_value: show array</text>
  <path class="return" d="M690 225 H382"/>
  <text class="label" x="468" y="242">MASTER FND updated</text>

  <path class="line" d="M382 275 H985"/>
  <text class="label" x="475" y="266">slave_probe_init / set brightness / display mode</text>
  <path class="line" d="M985 305 H1155"/>
  <text class="label" x="1010" y="296">I2C readable/writable register access</text>
  <path class="return" d="M1155 336 H985"/>
  <text class="label" x="1027" y="354">SLAVE_ID / ack / status</text>

  <path class="line" d="M70 390 H220"/>
  <text class="label" x="98" y="381">Start / pause / step / reset</text>
  <path class="line" d="M220 420 H382"/>
  <text class="label" x="247" y="411">command event</text>

  <path class="line" d="M540 470 H382"/>
  <text class="label" x="410" y="461">100 Hz timer tick</text>
  <path class="line" d="M382 500 H690"/>
  <text class="label" x="432" y="491">demo_sort_tick: update array FND</text>
  <path class="line" d="M382 532 H840"/>
  <text class="label" x="473" y="523">TRACE_COMPARE / TRACE_SWAP / TRACE_DONE</text>
  <path class="line" d="M840 565 H1155"/>
  <text class="label" x="914" y="556">SPI 24-byte trace frame</text>
  <path class="return" d="M1155 596 H840"/>
  <text class="label" x="918" y="614">decode counters and status</text>

  <path class="line" d="M382 646 H985"/>
  <text class="label" x="500" y="637">slave_health_tick: re-probe or reapply display mode</text>
  <path class="line" d="M985 676 H1155"/>
  <text class="label" x="1018" y="667">I2C write/read</text>
  <path class="return" d="M1155 706 H985"/>
  <text class="label" x="1028" y="724">ack or error</text>

  <path class="line" d="M382 760 H690"/>
  <text class="label" x="456" y="751">final sorted array</text>
  <path class="line" d="M382 790 H220"/>
  <text class="label" x="248" y="807">UART result output</text>

  <path class="brace" d="M1215 466 C1240 466 1240 496 1224 515 C1240 535 1240 595 1224 615 C1240 635 1240 675 1215 675"/>
  <text class="note" x="1244" y="552">Sort Tick</text>
  <text class="note" x="1244" y="570">Running</text>
  <text class="note" x="48" y="838">Style note: vertical dashed lifelines and plain arrow transactions follow the provided reference image.</text>
</svg>
