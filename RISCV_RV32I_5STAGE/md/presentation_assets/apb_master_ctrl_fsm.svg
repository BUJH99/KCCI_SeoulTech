<svg xmlns="http://www.w3.org/2000/svg" width="980" height="430" viewBox="0 0 980 430" role="img" aria-labelledby="title desc">
  <title id="title">APB Master Control FSM</title>
  <desc id="desc">APB IDLE, SETUP, ACCESS phase sequencing used by APBCtrl and abstracted by the AXI bridge APB master path.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .state { fill: #ffffff; stroke: #1f2937; stroke-width: 2; rx: 10; }
      .phase { fill: #eef2ff; stroke: #4338ca; }
      .note { fill: #f1f5f9; stroke: #64748b; stroke-width: 1.5; rx: 8; }
      .title { font: 700 24px Arial, sans-serif; fill: #111827; }
      .text { font: 600 17px Arial, sans-serif; fill: #111827; }
      .small { font: 13px Arial, sans-serif; fill: #374151; }
      .edge { fill: none; stroke: #334155; stroke-width: 2; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="980" height="430"/>
  <text class="title" x="40" y="48">APB Master Control FSM</text>
  <text class="small" x="40" y="76">Protocol abstraction: IDLE latches a request, SETUP asserts PSEL, ACCESS asserts PENABLE until completion.</text>

  <rect class="state" x="80" y="165" width="175" height="92"/>
  <text class="text" x="167" y="202" text-anchor="middle">IDLE</text>
  <text class="small" x="167" y="226" text-anchor="middle">wait iApbSel</text>

  <rect class="state phase" x="405" y="165" width="175" height="92"/>
  <text class="text" x="492" y="202" text-anchor="middle">SETUP</text>
  <text class="small" x="492" y="226" text-anchor="middle">PSEL=1, PENABLE=0</text>

  <rect class="state phase" x="730" y="165" width="175" height="92"/>
  <text class="text" x="817" y="202" text-anchor="middle">ACCESS</text>
  <text class="small" x="817" y="226" text-anchor="middle">PSEL=1, PENABLE=1</text>

  <path class="edge" d="M255 211 L405 211"/>
  <text class="small" x="330" y="196" text-anchor="middle">iApbSel</text>
  <path class="edge" d="M580 211 L730 211"/>
  <text class="small" x="655" y="196" text-anchor="middle">next cycle</text>
  <path class="edge" d="M817 165 C817 105 166 105 166 165"/>
  <text class="small" x="492" y="116" text-anchor="middle">iAccessComplete</text>
  <path class="edge" d="M817 257 C817 320 817 320 817 257"/>
  <text class="small" x="884" y="315" text-anchor="middle">wait PREADY or local error</text>

  <rect class="note" x="290" y="315" width="390" height="72"/>
  <text class="text" x="485" y="343" text-anchor="middle">Stable control during SETUP/ACCESS</text>
  <text class="small" x="485" y="368" text-anchor="middle">PADDR=reqAddr[11:0], PWRITE, PSTRB, PWDATA held from latched request</text>
</svg>
